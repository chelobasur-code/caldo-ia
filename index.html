<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Caldo IA</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial;
background:#071b15;
}

.app{
max-width:430px;
margin:auto;
min-height:100vh;
background:#f7f8f7;
padding-bottom:80px;
}

.header{
padding:24px 20px 10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:28px;
font-weight:900;
color:#111;
}

.logo span{
color:#08a63d;
}

.help{
width:36px;
height:36px;
border-radius:50%;
border:2px solid #08a63d;
background:white;
color:#08a63d;
font-weight:900;
font-size:18px;
}

.content{
padding:10px 20px;
}

h1{
font-size:25px;
margin:15px 0 6px;
}

.sub{
font-size:15px;
color:#57616a;
margin-bottom:20px;
}

.upload{
height:190px;
border:1.8px dashed #c9d2ce;
border-radius:18px;
background:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
position:relative;
box-shadow:0 8px 25px rgba(0,0,0,.05);
}

.upload input{
position:absolute;
inset:0;
opacity:0;
}

.camera{
width:76px;
height:76px;
border-radius:50%;
background:linear-gradient(135deg,#0bc84a,#087c32);
display:flex;
align-items:center;
justify-content:center;
font-size:34px;
color:white;
margin-bottom:12px;
box-shadow:0 10px 22px rgba(8,166,61,.3);
}

.upload b{
font-size:16px;
}

.upload small{
color:#6b7280;
margin-top:4px;
}

.ai-box{
margin-top:18px;
background:white;
border-radius:18px;
padding:15px;
display:flex;
gap:12px;
align-items:center;
box-shadow:0 8px 25px rgba(0,0,0,.05);
}

.ai-icon{
width:38px;
height:38px;
border-radius:10px;
background:#e8f8ed;
color:#08a63d;
display:flex;
align-items:center;
justify-content:center;
font-weight:900;
}

.ai-box b{
font-size:15px;
}

.ai-box p{
font-size:13px;
color:#6b7280;
margin:3px 0 0;
}

.section-title{
margin:24px 0 12px;
font-weight:800;
}

.examples{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.example{
height:95px;
border-radius:14px;
background:#eee;
box-shadow:0 6px 15px rgba(0,0,0,.08);
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
color:#333;
text-align:center;
padding:8px;
}

.recipe-input{
margin-top:18px;
}

textarea{
width:100%;
min-height:115px;
border-radius:18px;
border:1px solid #dbe3df;
padding:14px;
font-size:15px;
box-sizing:border-box;
resize:none;
}

.btn{
width:100%;
margin-top:15px;
border:0;
border-radius:18px;
background:linear-gradient(135deg,#08a63d,#057c2f);
color:white;
font-weight:900;
font-size:17px;
padding:16px;
}

.nav{
position:fixed;
bottom:0;
left:50%;
transform:translateX(-50%);
width:min(430px,100%);
height:68px;
background:white;
border-top:1px solid #e5ece8;
display:grid;
grid-template-columns:repeat(4,1fr);
}

.nav button{
border:0;
background:white;
font-size:20px;
color:#6b7280;
}

.nav .active{
color:#08a63d;
}

.nav span{
display:block;
font-size:11px;
margin-top:3px;
}

.toast{
position:fixed;
bottom:85px;
left:50%;
transform:translateX(-50%);
background:#071b15;
color:white;
padding:12px 18px;
border-radius:999px;
font-size:14px;
display:none;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
<div class="logo">⚗️ Caldo <span>IA</span></div>
<button class="help">?</button>
</div>

<div class="content">

<h1>1. Subí tu receta</h1>
<div class="sub">Sacá una foto, subí una captura o pegá la receta.</div>

<label class="upload">
<input type="file" accept="image/*" onchange="fotoCargada()">
<div class="camera">📷</div>
<b>Tomar foto</b>
<small>o arrastrá la imagen acá</small>
</label>

<div class="ai-box">
<div class="ai-icon">IA</div>
<div>
<b>La IA detectará productos y dosis</b>
<p>Por ahora pegamos texto; luego conectamos OCR.</p>
</div>
</div>

<div class="section-title">Ejemplos de recetas</div>

<div class="examples">
<div class="example">Barbecho<br>Glifo + 2,4D</div>
<div class="example">Preemergente<br>Finesse</div>
<div class="example">Fungicida<br>Trigo</div>
</div>

<div class="recipe-input">
<textarea id="receta">Glifosato 48% 2 L/ha
2,4D Amida 0.65 L/ha
Dicamba 48% 0.20 L/ha
Coadyuvante 75 cc/ha
Finesse 15 g/ha</textarea>
</div>

<button class="btn" onclick="continuar()">Convertir en calculadora →</button>

</div>

<div class="nav">
<button class="active">🏠<span>Inicio</span></button>
<button>🕘<span>Historial</span></button>
<button>📋<span>Recetas</span></button>
<button>👤<span>Perfil</span></button>
</div>

<div id="toast" class="toast">Foto cargada</div>

</div>

<script>
function fotoCargada(){
  mostrarToast("Foto cargada");
}

function mostrarToast(texto){
  const toast = document.getElementById("toast");
  toast.innerText = texto;
  toast.style.display = "block";
  setTimeout(()=> toast.style.display = "none", 1400);
}

function continuar(){
  document.body.innerHTML = `
  <div class="app">

    <div class="header">
      <button class="help" onclick="location.reload()">‹</button>
      <div class="logo">⚗️ Caldo <span>IA</span></div>
      <button class="help">?</button>
    </div>

    <div class="content">

      <h1>2. Ajustá los parámetros</h1>
      <div class="sub">Definí las condiciones de aplicación.</div>

      <div class="ai-box" style="display:block">
        <b>Hectáreas a aplicar</b>
        <input id="ha" type="number" value="100" oninput="calcular()" style="margin-top:10px;font-size:24px;font-weight:800">
      </div>

      <div class="ai-box" style="display:block">
        <b>Litros por hectárea (L/ha)</b>
        <div id="valorLha" class="camera" style="width:100%;height:auto;border-radius:0;background:white;color:#111;box-shadow:none;font-size:44px;margin:15px 0 5px">150</div>
        <input id="lhaRange" type="range" min="20" max="300" value="150" oninput="moverLha()" style="width:100%;accent-color:#08a63d">
        <input id="lha" type="number" value="150" oninput="editarLha()" style="margin-top:10px;font-size:24px;font-weight:800">
      </div>

      <div class="ai-box" style="display:block">
        <b>Capacidad del tanque</b>
        <input id="tanque" type="number" value="3000" oninput="calcular()" style="margin-top:10px;font-size:24px;font-weight:800">
      </div>

      <div class="ai-box" style="background:#e9ffe8;display:block">
        <span>Volumen total de caldo</span>
        <h2 id="total" style="font-size:38px;margin:8px 0 0">15.000 L</h2>
      </div>

      <button class="btn" onclick="alert('Paso 3: Resumen del cálculo')">Calcular →</button>

    </div>

    <div class="nav">
      <button>🏠<span>Inicio</span></button>
      <button>🕘<span>Historial</span></button>
      <button>📋<span>Recetas</span></button>
      <button>👤<span>Perfil</span></button>
    </div>

  </div>
  `;
  calcular();
}

function moverLha(){
  lha.value = lhaRange.value;
  valorLha.innerText = lhaRange.value;
  calcular();
}

function editarLha(){
  lhaRange.value = lha.value;
  valorLha.innerText = lha.value;
  calcular();
}

function calcular(){
  const ha = Number(document.getElementById("ha").value || 0);
  const lha = Number(document.getElementById("lha").value || 0);
  const total = ha * lha;
  document.getElementById("total").innerText = total.toLocaleString("es-AR") + " L";
}
</script>

</body>
</html>
